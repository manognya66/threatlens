<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Outer Circle/Lens -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="#64ffda" stroke-width="3" opacity="0.3"/>
  <circle cx="100" cy="100" r="75" fill="none" stroke="#64ffda" stroke-width="2" opacity="0.5"/>
  
  <!-- Shield Shape -->
  <path d="M 100 30 L 140 50 L 140 100 Q 140 140 100 160 Q 60 140 60 100 L 60 50 Z" 
        fill="none" stroke="#64ffda" stroke-width="3" stroke-linejoin="round"/>
  
  <!-- Inner Shield Detail -->
  <path d="M 100 45 L 130 60 L 130 100 Q 130 130 100 145 Q 70 130 70 100 L 70 60 Z" 
        fill="rgba(100, 255, 218, 0.1)" stroke="#64ffda" stroke-width="1.5"/>
  
  <!-- Lens Crosshair -->
  <line x1="100" y1="70" x2="100" y2="130" stroke="#64ffda" stroke-width="1.5" opacity="0.6"/>
  <line x1="70" y1="100" x2="130" y2="100" stroke="#64ffda" stroke-width="1.5" opacity="0.6"/>
  
  <!-- Center Dot -->
  <circle cx="100" cy="100" r="4" fill="#64ffda"/>
  
  <!-- Scanning Lines Effect -->
  <line x1="85" y1="80" x2="115" y2="80" stroke="#00ff88" stroke-width="1" opacity="0.8"/>
  <line x1="80" y1="95" x2="120" y2="95" stroke="#00ff88" stroke-width="1" opacity="0.6"/>
  <line x1="85" y1="110" x2="115" y2="110" stroke="#00ff88" stroke-width="1" opacity="0.8"/>
  
  <!-- Corner Brackets -->
  <path d="M 50 50 L 50 40 L 60 40" fill="none" stroke="#64ffda" stroke-width="2" opacity="0.7"/>
  <path d="M 150 50 L 150 40 L 140 40" fill="none" stroke="#64ffda" stroke-width="2" opacity="0.7"/>
  <path d="M 50 150 L 50 160 L 60 160" fill="none" stroke="#64ffda" stroke-width="2" opacity="0.7"/>
  <path d="M 150 150 L 150 160 L 140 160" fill="none" stroke="#64ffda" stroke-width="2" opacity="0.7"/>
</svg>
